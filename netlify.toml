# ── Netlify configuration ──
# แอพนี้เป็นเว็บ static (client-side) ล้วน — ไม่มีขั้นตอน build
# เผยแพร่ไฟล์จาก root ของรีโปโดยตรง
[build]
  publish = "."
  command = ""

# ── ปิด Secret scanning ──
# Netlify มองว่า SUPA_KEY (Supabase anon key) และ Google API key ที่ฝังใน
# index.html เป็น "ความลับรั่วไหล" แล้วทำให้ deploy ล้มเหลว
# แต่คีย์เหล่านี้เป็น publishable key ฝั่ง client โดยตั้งใจ (ต้องอยู่ในโค้ด
# ที่รันบนเบราว์เซอร์ ยังไงผู้ใช้ก็เห็นได้) ไม่ใช่ความลับฝั่งเซิร์ฟเวอร์
# แอพนี้ไม่มี secret ฝั่งเซิร์ฟเวอร์ที่ต้องปกป้อง จึงปิดการสแกนได้อย่างปลอดภัย
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
